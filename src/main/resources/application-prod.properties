# Production profile — activate with SPRING_PROFILES_ACTIVE=prod
# Secrets come from environment variables; the app fails fast if one is missing.
# Non-secret settings are defined here because application.properties is
# gitignored (it holds real dev credentials) and never reaches the build.

spring.application.name=ZapFile

# Render injects PORT and routes traffic to it
server.port=${PORT:8080}

spring.datasource.url=${SPRING_DATASOURCE_URL}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.jpa.hibernate.ddl-auto=update

# no dev conveniences in prod
spring.h2.console.enabled=false

# no default secret in prod — must be provided
zapfile.jwt.secret=${ZAPFILE_JWT_SECRET}
zapfile.jwt.access-expiry-minutes=30
zapfile.jwt.refresh-expiry-days=30

zapfile.pairing-code.expiry-minutes=10
