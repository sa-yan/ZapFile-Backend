# Production profile — activate with SPRING_PROFILES_ACTIVE=prod
# All values come from environment variables; the app fails fast if one is missing.

spring.datasource.url=${SPRING_DATASOURCE_URL}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.jpa.hibernate.ddl-auto=update

# no dev conveniences in prod
spring.h2.console.enabled=false

# no default secret in prod — must be provided
zapfile.jwt.secret=${ZAPFILE_JWT_SECRET}
