spring.application.name=ZapFile

# Render (and most PaaS) inject PORT; default to 8081 locally (8080 is taken on the dev machine)
server.port=${PORT:8081}

# --- Database (H2 file-based for dev; swap to PostgreSQL for prod) ---
spring.datasource.url=jdbc:h2:file:./data/zapfile
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.hibernate.ddl-auto=update
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# --- JWT ---
# Override in prod via environment variable ZAPFILE_JWT_SECRET (min 32 bytes)
zapfile.jwt.secret=${ZAPFILE_JWT_SECRET:dev-secret-change-me-dev-secret-change-me}
zapfile.jwt.access-expiry-minutes=30
zapfile.jwt.refresh-expiry-days=30

# --- Friend pairing codes ---
zapfile.pairing-code.expiry-minutes=10
